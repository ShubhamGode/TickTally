<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Time Tracker</title>
    <link rel="stylesheet" href="time.css" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
  </head>

  <body>
    <div class="layout">
      <div class="container">
        <h2>Work Progress</h2>

        <div class="input-group">
          <label>Total Time (Hours)</label>
          <input type="number" id="totalHours" placeholder="e.g., 8" />
          <button onclick="startTasks()">Start</button>
        </div>

        <div id="taskSection"></div>

        <button class="secondary" onclick="generateChart()">
          Visualize Progress
        </button>
      </div>

      <div class="chart-container">
        <canvas id="pieChart"></canvas>
        <button
          class="secondary"
          id="DownloadBtn"
          style="display: none"
          onclick="downloadChart()"
        >
          Download Chart
        </button>
      </div>
    </div>
    <div class="bottom-btn">
      <button onclick="goAmount()">← Switch to Time Tracker</button>
    </div>
    <!-- <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> -->
    <script src="Time.js"></script>
  </body>
</html>
